<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Manage News | Polymart</title>
    <link rel="icon" href="https://i.ibb.co/B5GMcb9z/Gemini-Generated-Image-mmtbiymmtbiymmtb-removebg-preview.png">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
    <link rel="stylesheet" href="../../assets/css/styles.css">
  </head>
  <body>
    <header class="site-header" data-site-header></header>
    <main>
      <section class="page-title">
        <h1>News Management</h1>
        <p>Publish updates for customers and sellers.</p>
      </section>
      <section class="section">
        <nav class="admin-tabs" data-admin-tabs></nav>
        <div class="admin-layout">
          <form class="panel form-grid" data-news-form>
            <h2>Add Article</h2>
            <input type="hidden" name="id">
            <label>Title <input class="input" name="title" required></label>
            <label>Category <input class="input" name="category" required></label>
            <label>Date <input class="input" name="date" type="date" required></label>
            <label>Image URL <input class="input" name="image" required></label>
            <label>Body <textarea class="textarea" name="body" required></textarea></label>
            <button class="btn btn-primary" type="submit"><i class="fa-solid fa-newspaper"></i> Save Article</button>
          </form>
          <div class="panel">
            <h2>Articles</h2>
            <div class="table-list" data-news-list></div>
          </div>
        </div>
      </section>
    </main>
    <footer class="site-footer" data-site-footer></footer>
    <script type="module" src="../../modules/admin/news.js"></script>
  </body>
</html>
