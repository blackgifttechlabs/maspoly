<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Manage Products | Polymart</title>
    <link rel="icon" href="https://i.ibb.co/B5GMcb9z/Gemini-Generated-Image-mmtbiymmtbiymmtb-removebg-preview.png">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
    <link rel="stylesheet" href="../../assets/css/styles.css">
  </head>
  <body>
    <header class="site-header" data-site-header></header>
    <main>
      <section class="page-title">
        <h1>Product Management</h1>
        <p>Add, edit, and remove department or student listings.</p>
      </section>
      <section class="section">
        <nav class="admin-tabs" data-admin-tabs></nav>
        <div class="admin-layout">
          <form class="panel form-grid" data-product-form>
            <h2>Add Product</h2>
            <input type="hidden" name="id">
            <label>Name <input class="input" name="name" required></label>
            <label>Department <input class="input" name="department" required></label>
            <label>Seller type
              <select class="select" name="sellerType">
                <option>Department</option>
                <option>Student Project</option>
              </select>
            </label>
            <div class="form-grid two">
              <label>Price <input class="input" name="price" type="number" step="0.01" required></label>
              <label>Stock <input class="input" name="stock" type="number" required></label>
            </div>
            <label class="check-option">
              <input type="checkbox" name="featured">
              Show on homepage featured products
            </label>
            <label>Image URL or Base64 Data <input class="input" name="image" placeholder="Paste an image URL or upload below"></label>
            <label>Upload image
              <input class="input" type="file" accept="image/*" data-image-upload>
            </label>
            <div class="image-preview" data-image-preview></div>
            <div class="upload-progress" data-image-progress hidden>
              <div class="upload-progress-bar" style="width:0%"></div>
            </div>
            <label>Summary <input class="input" name="summary" required></label>
            <label>Description <textarea class="textarea" name="description" required></textarea></label>
            <button class="btn btn-primary" type="submit"><i class="fa-solid fa-floppy-disk"></i> Save Product</button>
          </form>
          <div class="panel">
            <h2>Listings</h2>
            <div class="table-list" data-product-list></div>
          </div>
        </div>
      </section>
    </main>
    <footer class="site-footer" data-site-footer></footer>
    <script type="module" src="../../modules/admin/products.js"></script>
  </body>
</html>
