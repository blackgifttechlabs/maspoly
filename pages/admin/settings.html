<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Admin Settings | Polymart</title>
    <link rel="icon" href="https://i.ibb.co/B5GMcb9z/Gemini-Generated-Image-mmtbiymmtbiymmtb-removebg-preview.png">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
    <link rel="stylesheet" href="../../assets/css/styles.css">
  </head>
  <body>
    <header class="site-header" data-site-header></header>
    <main>
      <section class="page-title">
        <h1>Admin Settings</h1>
        <p>Change administrator access settings for this browser-based project.</p>
      </section>
      <section class="section">
        <nav class="admin-tabs" data-admin-tabs></nav>
        <div class="admin-layout">
          <form class="panel form-grid" data-pin-form>
            <h2>Change Admin PIN</h2>
            <div class="notice" data-notice hidden></div>
            <label>
              Current PIN
              <input class="input" name="currentPin" type="password" inputmode="numeric" required>
            </label>
            <label>
              New PIN
              <input class="input" name="newPin" type="password" inputmode="numeric" minlength="4" maxlength="8" required>
            </label>
            <button class="btn btn-primary" type="submit"><i class="fa-solid fa-key"></i> Save New PIN</button>
          </form>
          <aside class="summary-box">
            <h2>Access Notes</h2>
            <p class="muted">Default admin PIN is 1677 until it is changed.</p>
            <p class="muted">For a live production system, replace this project PIN with Firebase admin roles and server-side checks.</p>
          </aside>
        </div>
      </section>
    </main>
    <footer class="site-footer" data-site-footer></footer>
    <script type="module" src="../../modules/admin/settings.js"></script>
  </body>
</html>
