<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Checkout | Polymart</title>
    <link rel="icon" href="https://i.ibb.co/B5GMcb9z/Gemini-Generated-Image-mmtbiymmtbiymmtb-removebg-preview.png">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
    <link rel="stylesheet" href="../assets/css/styles.css">
    <!-- Leaflet for map picker -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" defer></script>
  </head>
  <body>
    <header class="site-header" data-site-header></header>
    <main>
      <section class="page-title">
        <h1>Checkout</h1>
        <p>Choose a delivery address and start the PayNow payment process.</p>
      </section>
      <section class="section">
        <div class="checkout-layout">
          <div class="panel">
            <h2>Delivery and Contact</h2>
            <div class="notice" data-notice hidden></div>
            <form class="form-grid" data-checkout-form>
              <div class="form-grid two">
                <label>
                  Full name
                  <input class="input" name="name" required>
                </label>
                <label>
                  Email
                  <input class="input" name="email" type="email" required>
                </label>
              </div>
              <label>
                Phone number
                <input class="input" name="phone" required>
              </label>
              <label>
                Delivery address
                <textarea class="textarea" name="address" required placeholder="Enter hostel, department, office, or city delivery address"></textarea>
              </label>
              <div class="map-placeholder" data-map>
                <div>
                  <i class="fa-solid fa-map-location-dot"></i>
                  <h3>Map Address Picker</h3>
                  <p>Click the map or drag the marker to pick a delivery point. Coordinates will be added to the address field.</p>
                </div>
              </div>
              <button class="btn btn-primary" type="submit"><i class="fa-solid fa-credit-card"></i> Pay with PayNow</button>
            </form>
          </div>
          <aside class="summary-box" data-checkout-summary></aside>
        </div>
      </section>
    </main>
    <footer class="site-footer" data-site-footer></footer>
    <script type="module" src="../modules/customer/checkout.js"></script>
  </body>
</html>
