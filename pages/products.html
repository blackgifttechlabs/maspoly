<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Products | Polymart</title>
    <link rel="icon" href="https://i.ibb.co/B5GMcb9z/Gemini-Generated-Image-mmtbiymmtbiymmtb-removebg-preview.png">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
    <link rel="stylesheet" href="../assets/css/styles.css">
  </head>
  <body>
    <header class="site-header" data-site-header></header>
    <main>
      <section class="page-title">
        <h1>Products and Services</h1>
        <p>Search department listings, compare prices, and add items to your cart.</p>
      </section>
      <section class="section">
        <div class="toolbar">
          <input class="input" data-search type="search" placeholder="Search products, services, or departments">
          <select class="select" data-department>
            <option value="">All departments</option>
          </select>
          <select class="select" data-sort>
            <option value="name">Sort by name</option>
            <option value="price-low">Lowest price</option>
            <option value="price-high">Highest price</option>
            <option value="rating">Top rated</option>
          </select>
        </div>
        <div class="product-grid" data-products></div>
      </section>
    </main>
    <footer class="site-footer" data-site-footer></footer>
    <script type="module" src="../modules/customer/products.js"></script>
  </body>
</html>
