<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Sell an Item | Polymart</title>
    <link rel="icon" href="https://i.ibb.co/B5GMcb9z/Gemini-Generated-Image-mmtbiymmtbiymmtb-removebg-preview.png">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
    <link rel="stylesheet" href="../assets/css/styles.css">
  </head>
  <body>
    <header class="site-header" data-site-header></header>
    <main>
      <section class="page-title">
        <h1>Sell an Item</h1>
        <p>Create a listing to sell to the campus community.</p>
      </section>
      <section class="section">
        <div class="admin-layout">
          <form class="panel form-grid" data-sell-form>
            <h2>Add Listing</h2>
            <input type="hidden" name="id">
            <label>Name <input class="input" name="name" required></label>
            <label>Department <input class="input" name="department" required></label>
            <label>Price <input class="input" name="price" type="number" step="0.01" required></label>
            <label>Stock <input class="input" name="stock" type="number" required></label>
            <label>Image URL or Base64 Data <input class="input" name="image" placeholder="Paste an image URL or upload below"></label>
            <label>Description <textarea class="textarea" name="description" required></textarea></label>
            <button class="btn btn-primary" type="submit"><i class="fa-solid fa-floppy-disk"></i> Save Listing</button>
          </form>
          <aside class="summary-box">
            <h2>Seller Dashboard</h2>
            <p class="muted">After creating listings you'll see orders for your products on your Seller Dashboard.</p>
            <a class="btn btn-outline" href="seller-dashboard.html">Go to Seller Dashboard</a>
          </aside>
        </div>
      </section>
    </main>
    <footer class="site-footer" data-site-footer></footer>
    <script type="module" src="../modules/customer/sell.js"></script>
  </body>
</html>
