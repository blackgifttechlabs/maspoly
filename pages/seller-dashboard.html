<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Seller Dashboard | Polymart</title>
    <link rel="icon" href="https://i.ibb.co/B5GMcb9z/Gemini-Generated-Image-mmtbiymmtbiymmtb-removebg-preview.png">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
    <link rel="stylesheet" href="../assets/css/styles.css">
  </head>
  <body>
    <header class="site-header" data-site-header></header>
    <main>
      <section class="page-title">
        <h1>Seller Dashboard</h1>
        <p>Your product listings and orders from customers.</p>
      </section>
      <section class="section">
        <div class="admin-layout">
          <div class="panel">
            <h2>Your Listings</h2>
            <div class="table-list" data-seller-products></div>
          </div>
          <aside class="summary-box">
            <h2>Orders</h2>
            <div class="table-list" data-seller-orders></div>
          </aside>
        </div>
      </section>
    </main>
    <footer class="site-footer" data-site-footer></footer>
    <script type="module" src="../modules/customer/seller-dashboard.js"></script>
  </body>
</html>
